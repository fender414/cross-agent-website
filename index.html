<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社クロスエージェント</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.7;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }

        header {
            background-color: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* 💻 PCでは左右に広がり、📱 スマホでは横スクロールするナビゲーション */
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        /* ロゴ部分のスタイル（画像がなければ文字として綺麗に表示されます） */
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #111;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo img {
            max-height: 40px;
            display: block;
        }

        /* メニュー全体の並び */
        .menu-links {
            display: flex;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .menu-links a {
            margin-left: 25px;
            text-decoration: none;
            color: #555;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
            padding: 8px 0;
        }

        .menu-links a:hover {
            color: #0066cc;
        }

        /* 📱 スマホ画面（幅768px以下）での調整 */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px 15px;
            }
            .menu-links {
                width: 100%;
                margin-top: 15px;
                padding-bottom: 5px;
            }
            .menu-links a {
                margin-left: 0;
                margin-right: 20px;
            }
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .container h2 {
            font-size: 2.2rem;
            color: #111;
            margin-bottom: 20px;
        }

        .container p {
            font-size: 1.1rem;
            color: #666;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #aaa;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            background-color: #fff;
            margin-top: 100px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <!-- 📁 もしロゴ画像（logo.pngなど）があればここに差し替えてください。現在は文字で「株式会社クロスエージェント」と入れています。 -->
            <a href="index.html" class="logo">株式会社クロスエージェント</a>
            
            <!-- 📄 消えていた全てのメニューを復元しました -->
            <div class="menu-links">
                <a href="index.html">ホーム</a>
                <a href="about.html">会社概要</a>
                <a href="business.html">事業内容</a>
                <a href="#">ニュース</a>
                <a href="#">採用情報</a>
                <a href="#">お問い合わせ</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <h2>ウェブサイトへようこそ</h2>
        <p>ここにトップページの文章が入ります。信頼と実績のクロスエージェント。</p>
    </div>

    <footer>
        <p>&copy; 2026 株式会社クロスエージェント</p>
    </footer>

</body>
</html>
