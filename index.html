<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社クロスエージェント</title>
    <style>
        /* 全体の基本設定 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.7;
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* 👑 メニューを一番上に固定する設定 */
        header {
            width: 100%;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* メニューを横一列に均等に並べる */
        nav {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 10px;
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 1rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #0066cc;
        }

        /* 現在のページ（ホーム）のスタイル */
        nav a.current {
            color: #888888;
            pointer-events: none;
        }

        /* 本文エリア */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            color: #111;
            font-size: 2.2em;
            margin-top: 50px;
        }

        footer {
            margin-top: 80px;
            border-top: 1px solid #eee;
            padding: 30px 0;
            font-size: 0.85em;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="current">ホーム</a>
            <a href="about.html">会社概要</a>
            <a href="business.html">事業内容</a>
            <a href="#">ニュース</a>
            <a href="#">採用情報</a>
            <a href="#">お問い合わせ</a>
        </nav>
    </header>

    <main>
        <h1>株式会社クロスエージェント</h1>
        <p>ウェブサイトへようこそ。ここにトップページの文章が入ります。</p>
    </main>

    <footer>
        <p>&copy; 2026 株式会社クロスエージェント</p>
    </footer>

</body>
</html>
