<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社クロスエージェント</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.7;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            width: 100%;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        /* ✨ ここを修正しました：最大幅をしっかり持たせ、左右いっぱいに均等に広げます */
        nav {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 0;
            display: flex;
            justify-content: space-between; /* これで最初のイメージ通りに左右に広がります */
            align-items: center;
            box-sizing: border-box;
            
            /* スマホで2行に折り返させないための設定 */
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 1rem;
            font-weight: bold;
            padding: 10px 20px;
            display: inline-block;
            flex-shrink: 0; /* スマホで文字を潰れさせない指示 */
        }
        nav a:hover {
            color: #0066cc;
        }
        nav a.current {
            color: #888888;
            pointer-events: none;
        }
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            color: #111;
            font-size: 2.2em;
            margin-top: 50px;
        }
        footer {
            margin-top: 80px;
            border-top: 1px solid #eee;
            padding: 30px 0;
            font-size: 0.85em;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="./" class="current">ホーム</a>
            <a href="about.html">会社概要</a>
            <a href="business.html">事業内容</a>
            <a href="#">ニュース</a>
            <a href="#">採用情報</a>
            <a href="#">お問い合わせ</a>
        </nav>
    </header>

    <main>
        <h1>株式会社クロスエージェント</h1>
        <p>ウェブサイトへようこそ。ここにトップページの文章が入ります。</p>
    </main>

    <footer>
        <p>&copy; 2026 株式会社クロスエージェント</p>
    </footer>

</body>
</html>
